<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebRTC 텍스트 송수신</title>
<style>
  body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.3rem; }
  #status { padding: 8px 12px; border-radius: 6px; background: #eee; margin-bottom: 12px; font-size: 0.9rem; }
  #status.connected { background: #d4f7d4; }
  .panel-label { font-size: 0.8rem; color: #666; margin: 12px 0 4px; font-weight: 600; }
  .log { border: 1px solid #ccc; border-radius: 6px; overflow-y: auto; padding: 8px; margin-bottom: 12px; }
  #conn-log { height: 180px; background: #fafafa; font-size: 0.82rem; }
  #chat-log { height: 240px; }
  .msg { margin: 4px 0; padding: 6px 10px; border-radius: 8px; max-width: 80%; width: fit-content; }
  .msg.recv { background: #f0f0f0; }
  .msg.sent { background: #d0e7ff; margin-left: auto; }
  .msg.sys { background: none; color: #888; font-size: 0.8rem; }
  .msg .meta { font-size: 0.7rem; color: #888; display: block; }
  form { display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: 8px 16px; border: 0; border-radius: 6px; background: #2b6cb0; color: #fff; cursor: pointer; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #room-form { margin-bottom: 12px; flex-wrap: wrap; }
  #signal-input, #turn-input { flex-basis: 100%; }
</style>
</head>
<body>
<h1>WebRTC DataChannel 텍스트 송수신</h1>

<form id="room-form">
  <input type="text" id="signal-input" placeholder="시그널 서버 주소 (https://...)">
  <input type="text" id="turn-input" placeholder="TURN 서버 (선택, 예: turn:host:3478?transport=udp)">
  <input type="text" id="turn-user" placeholder="TURN username (선택)">
  <input type="text" id="turn-cred" placeholder="TURN credential (선택)">
  <label style="flex-basis:100%;font-size:0.85rem;color:#555;">
    <input type="checkbox" id="turn-only"> TURN 릴레이 강제 (relay 후보만 사용 — TURN 동작 확인용)
  </label>
  <input type="text" id="room-input" placeholder="방 이름 (예: test)" value="YHS">
  <button type="submit" id="join-btn">입장</button>
</form>

<button type="button" id="nat-btn" style="background:#555;margin-bottom:12px;">NAT 타입 진단 (Cone/Symmetric)</button>

<div id="status">대기 중 — 방에 입장하세요</div>

<div class="panel-label">연결 과정 / 진단 로그</div>
<div id="conn-log" class="log"></div>

<div class="panel-label">수신 / 송신 데이터</div>
<div id="chat-log" class="log"></div>

<form id="send-form">
  <input type="text" id="msg-input" placeholder="보낼 메시지" disabled>
  <button type="submit" id="send-btn" disabled>전송</button>
</form>

<script>
// signalsvc(HTTP long-poll 릴레이 시그널링) 프로토콜 — edge의 p2p/signal.go와 동일:
//   POST /rooms/{room}/join   {peer_id?}                → {peer_id, token, peers}
//   POST /rooms/{room}/send   {from, token, to?, kind, payload}
//   GET  /rooms/{room}/poll   ?peer_id=&token=&wait=25  → {messages}
//   POST /rooms/{room}/leave  {peer_id, token}
// kind: offer/answer/ice + 서버 발행 peer-joined/peer-left
// 토폴로지: 1:N 별형(star) — 이 페이지는 edge 하고만 연결한다. 브라우저끼리는
// offer 하지도, 받아주지도 않는다 (룸의 다른 브라우저는 각자 edge 와만 붙는다).
// edge 는 answerer 전용이므로 offer 는 항상 브라우저 몫: join 시 edge 가 있으면,
// 그리고 edge 의 peer-joined(재기동 포함)마다 새로 offer 한다.
const DEFAULT_SIGNAL = 'https://signalsvc-116558809518.asia-northeast3.run.app';
// LTE 검증용 무료 공개 TURN (Metered Open Relay) — 핸드폰 입력 번거로움 방지 기본값.
// 테스트용이라 불안정할 수 있음. 실제 서비스는 Cloudflare/Metered 등 자기 자격증명 사용.
const DEFAULT_TURN = 'turn:openrelay.metered.ca:80,turn:openrelay.metered.ca:443,turn:openrelay.metered.ca:443?transport=tcp';
const DEFAULT_TURN_USER = 'openrelayproject';
const DEFAULT_TURN_CRED = 'openrelayproject';
const EDGE_PEER = 'edge'; // edge 의 룸 내 peer_id (edgeservice config p2p.peer_id 기본값)
let signalBase = DEFAULT_SIGNAL; // 입장 시 입력창 값으로 확정
const STUN = [{ urls: 'stun:stun.l.google.com:19302' }];
// LTE(이통사 CGNAT/Symmetric NAT)에서는 STUN 만으로 hole punching 이 실패한다.
// 입장 시 TURN 입력값이 있으면 iceServers 에 더해 relay 후보로 우회한다.
let iceServers = STUN;       // 입장 시 TURN 입력값으로 확정
let iceTransportPolicy = 'all'; // 'relay' 로 두면 relay 후보만 써서 TURN 동작을 강제 확인
const POLL_WAIT = 25;

const signalInput = document.getElementById('signal-input');
const turnInput = document.getElementById('turn-input');
const turnUser = document.getElementById('turn-user');
const turnCred = document.getElementById('turn-cred');
const turnOnly = document.getElementById('turn-only');
const statusEl = document.getElementById('status');
const connLogEl = document.getElementById('conn-log'); // 연결 과정 / 진단 (sys)
const chatLogEl = document.getElementById('chat-log');  // 수신 / 송신 데이터 (recv/sent)
const roomForm = document.getElementById('room-form');
const roomInput = document.getElementById('room-input');
const joinBtn = document.getElementById('join-btn');
const sendForm = document.getElementById('send-form');
const msgInput = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

let room = null;
let myId = null;
let token = null;
let lastSeq = 0; // 마지막으로 처리한 seq (ack 커서). join 시 0으로 리셋
let polling = false;
const peers = new Map(); // peerID -> {pc, dc, pending: [], remoteSet: false}

function setStatus(text, connected = false) {
  statusEl.textContent = text;
  statusEl.classList.toggle('connected', connected);
}

function refreshStatus() {
  const open = [...peers.entries()].filter(([, p]) => p.dc && p.dc.readyState === 'open').map(([id]) => id);
  const ok = open.length > 0;
  setStatus(`내 ID: ${myId} · 연결된 피어: ${ok ? open.join(', ') : '없음'}`, ok);
  msgInput.disabled = !ok;
  sendBtn.disabled = !ok;
}

// sys → 연결 과정 로그(conn-log), recv/sent → 데이터 로그(chat-log) 로 분리
function addMessage(text, kind, from) {
  const div = document.createElement('div');
  div.className = 'msg ' + kind;
  if (kind !== 'sys') {
    const meta = document.createElement('span');
    meta.className = 'meta';
    meta.textContent = (kind === 'recv' ? `수신 ← ${from}` : '송신') + ' · ' + new Date().toLocaleTimeString();
    div.appendChild(meta);
  }
  div.appendChild(document.createTextNode(text));
  const target = kind === 'sys' ? connLogEl : chatLogEl;
  target.appendChild(div);
  target.scrollTop = target.scrollHeight;
}

// --- 시그널링 API ---
function roomPath(suffix) {
  return `${signalBase}/rooms/${encodeURIComponent(room)}/${suffix}`;
}

async function apiPost(suffix, body) {
  const res = await fetch(roomPath(suffix), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw Object.assign(new Error(`${suffix} -> ${res.status}`), { status: res.status });
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function sendSignal(to, kind, payload) {
  return apiPost('send', { from: myId, token, to, kind, payload })
    .catch(err => console.warn(`[P2P] send ${kind} to ${to} 실패:`, err));
}

async function joinRoom() {
  const resp = await apiPost('join', {});
  myId = resp.peer_id;
  token = resp.token;
  lastSeq = 0; // 재-join 시 서버 큐/seq 가 새로 시작하므로 커서 리셋
  addMessage(`"${room}" 방 입장 (내 ID: ${myId}, 기존 피어: ${resp.peers.length ? resp.peers.join(', ') : '없음'})`, 'sys');
  refreshStatus();
  // 1:N — edge 가 이미 룸에 있으면 edge 에게만 offer (다른 브라우저는 무시)
  if (resp.peers.includes(EDGE_PEER)) connectTo(EDGE_PEER);
}

async function pollLoop() {
  polling = true;
  while (polling) {
    let msgs;
    try {
      const q = new URLSearchParams({ peer_id: myId, token, wait: POLL_WAIT, since: lastSeq });
      const res = await fetch(roomPath('poll') + '?' + q);
      if (res.status === 404 || res.status === 403) {
        // 서버에서 세션이 사라짐 — 재입장
        addMessage('시그널 세션 만료 — 재입장합니다', 'sys');
        await joinRoom();
        continue;
      }
      if (!res.ok) throw new Error(`poll -> ${res.status}`);
      msgs = (await res.json()).messages || [];
    } catch (err) {
      console.warn('[P2P] poll 오류:', err);
      addMessage(`⚠ poll 오류: ${err.message} — 2초 후 재시도`, 'sys');
      await new Promise(r => setTimeout(r, 2000));
      continue;
    }
    for (const msg of msgs) {
      if (msg.seq <= lastSeq) continue; // 재전송된 중복 skip
      lastSeq = msg.seq;                 // 커서 전진
      await handleSignal(msg).catch(e => console.error('[P2P] handle:', e));
    }
  }
}

async function handleSignal(msg) {
  switch (msg.kind) {
    case 'offer': return handleOffer(msg.from, msg.payload);
    case 'answer': return handleAnswer(msg.from, msg.payload);
    case 'ice': return handleIce(msg.from, msg.payload);
    case 'peer-joined':
      addMessage(`피어 입장: ${msg.from}`, 'sys');
      // 1:N — edge 가 (재)기동해 들어온 경우에만 재-offer. edge 는 answerer
      // 전용이라 이쪽에서 offer 해야만 연결된다. 다른 브라우저 입장은 표시만.
      if (msg.from === EDGE_PEER) await connectTo(msg.from);
      break;
    case 'peer-left': {
      addMessage(`피어 퇴장: ${msg.from}`, 'sys');
      const p = peers.get(msg.from);
      // 룸 퇴장이 곧 P2P 종료는 아님 — 협상 중이던 상태만 정리
      if (p && (!p.dc || p.dc.readyState !== 'open')) closePeer(msg.from, 'peer-left before connect');
      break;
    }
  }
}

// --- WebRTC ---
function newPeer(id) {
  const pc = new RTCPeerConnection({ iceServers, iceTransportPolicy });
  const p = { pc, dc: null, pending: [], remoteSet: false };
  peers.set(id, p);

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      console.log(`[P2P] local candidate type=${e.candidate.type} ${e.candidate.protocol} ${e.candidate.address}`);
      sendSignal(id, 'ice', e.candidate.toJSON());
    }
  };
  pc.onicegatheringstatechange = () => {
    if (pc.iceGatheringState === 'complete') {
      const types = (pc.localDescription?.sdp.match(/typ (\w+)/g) || []).map(s => s.slice(4));
      addMessage(`ICE 후보 수집 완료: ${[...new Set(types)].join(', ') || '없음'}${types.includes('relay') ? '' : ' (relay 없음 — TURN 미설정)'}`, 'sys');
    }
  };
  pc.onconnectionstatechange = () => {
    console.log(`[P2P] peer=${id} state=${pc.connectionState}`);
    addMessage(`[${id}] connectionState=${pc.connectionState}`, 'sys');
    if (pc.connectionState === 'failed') {
      addMessage(`${id} 연결 실패 (ICE failed — NAT 통과 불가, TURN 필요 가능성)`, 'sys');
    }
    if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
      closePeer(id, pc.connectionState);
    }
    refreshStatus();
  };
  pc.oniceconnectionstatechange = () => {
    addMessage(`[${id}] iceConnectionState=${pc.iceConnectionState}`, 'sys');
  };
  return p;
}

function setupChannel(id, p, dc) {
  p.dc = dc;
  dc.onopen = () => { addMessage(`데이터채널 연결됨: ${id}`, 'sys'); refreshStatus(); };
  // 텍스트 수신 지점
  dc.onmessage = (e) => addMessage(typeof e.data === 'string' ? e.data : new TextDecoder().decode(e.data), 'recv', id);
  dc.onclose = () => refreshStatus();
}

// offerer: 기존 피어에게 연결 시도
async function connectTo(id) {
  closePeer(id, 're-connect');
  const p = newPeer(id);
  setupChannel(id, p, p.pc.createDataChannel('chat'));
  const offer = await p.pc.createOffer();
  await p.pc.setLocalDescription(offer);
  await sendSignal(id, 'offer', p.pc.localDescription.toJSON());
  addMessage(`${id} 에게 offer 전송 — 연결 시도 중…`, 'sys');
}

// answerer 역할: 1:N 에서는 edge 가 offer 하지 않으므로 정상 흐름에서 여기 올 일이
// 없다. 다른 브라우저(구버전 페이지 등)의 offer 는 받지 않는다.
async function handleOffer(from, payload) {
  if (from !== EDGE_PEER) {
    console.log(`[P2P] 1:N — ${from} 의 offer 무시 (edge 전용 연결)`);
    return;
  }
  closePeer(from, 're-offer');
  const p = newPeer(from);
  p.pc.ondatachannel = (e) => setupChannel(from, p, e.channel);
  await p.pc.setRemoteDescription(payload);
  p.remoteSet = true;
  for (const c of p.pending.splice(0)) await p.pc.addIceCandidate(c).catch(e => console.warn(e));
  const answer = await p.pc.createAnswer();
  await p.pc.setLocalDescription(answer);
  await sendSignal(from, 'answer', p.pc.localDescription.toJSON());
  addMessage(`${from} 의 offer 에 answer 전송 — 연결 시도 중…`, 'sys');
}

async function handleAnswer(from, payload) {
  const p = peers.get(from);
  if (!p) { addMessage(`⚠ ${from} answer 수신했으나 해당 피어 없음 — 버림`, 'sys'); return; }
  // 재협상 직후 이전 offer 에 대한 늦은 answer 방어: offer 대기 상태가 아니면 무시
  if (p.pc.signalingState !== 'have-local-offer') {
    addMessage(`⚠ ${from} answer 수신했으나 상태=${p.pc.signalingState} (have-local-offer 아님) — 버림`, 'sys');
    return;
  }
  const inSdp = (payload.sdp?.match(/a=candidate/g) || []).length;
  addMessage(`${from} answer 수신 (SDP 내 후보 ${inSdp}개) — remote 설정, ICE 검사 시작`, 'sys');
  await p.pc.setRemoteDescription(payload);
  p.remoteSet = true;
  const buffered = p.pending.length;
  for (const c of p.pending.splice(0)) await p.pc.addIceCandidate(c).catch(e => console.warn(e));
  if (buffered) addMessage(`${from} 버퍼된 ICE 후보 ${buffered}개 적용`, 'sys');
}

async function handleIce(from, payload) {
  const p = peers.get(from);
  if (!p) { addMessage(`⚠ ${from} ICE 수신했으나 해당 피어 없음 — 버림`, 'sys'); return; }
  // 원격 후보 파악 (candidate 문자열: "... <IP> <PORT> typ host|srflx|relay ...")
  const mm = payload.candidate?.match(/ (\S+) (\d+) typ (\w+)/);
  const t = mm ? `${mm[3]} ${mm[1]}:${mm[2]}` : '?';
  if (!p.remoteSet) { p.pending.push(payload); addMessage(`${from} ICE 후보 수신(${t}) — remote 설정 전이라 버퍼`, 'sys'); return; }
  addMessage(`${from} ICE 후보 수신(${t}) 적용`, 'sys');
  await p.pc.addIceCandidate(payload).catch(e => console.warn('[P2P] addIceCandidate:', e));
}

function closePeer(id, reason) {
  const p = peers.get(id);
  if (!p) return;
  peers.delete(id);
  p.pc.close();
  console.log(`[P2P] closed peer=${id} (${reason})`);
  refreshStatus();
}

// --- UI ---
// 시그널 주소 초기값: ?signal= 쿼리 > 지난번 사용값(localStorage) > 기본값
signalInput.value = new URLSearchParams(location.search).get('signal')
  || localStorage.getItem('signalBase')
  || DEFAULT_SIGNAL;
// TURN 기본값: 지난번 사용값(localStorage) > openrelay 기본값. getItem 이 빈 문자열이면
// "일부러 비웠다"는 뜻이므로 ?? 로 구분 (|| 를 쓰면 빈값도 기본값으로 되돌아감).
turnInput.value = localStorage.getItem('turnUrl') ?? DEFAULT_TURN;
turnUser.value = localStorage.getItem('turnUser') ?? DEFAULT_TURN_USER;
turnCred.value = localStorage.getItem('turnCred') ?? DEFAULT_TURN_CRED;

// --- NAT 타입 자가진단 ---
// 하나의 RTCPeerConnection 에 STUN 서버 여러 개를 넣으면 모두 같은 로컬 base 포트에서
// 요청이 나간다. 돌아온 공인(srflx) 포트가 하나면 endpoint-independent(=Cone), 목적지마다
// 다르면 Symmetric. Symmetric 이면 STUN hole punching 이 실패하므로 TURN 이 필수다.
const natBtn = document.getElementById('nat-btn');
const NAT_STUN = [
  'stun:stun.l.google.com:19302',
  'stun:stun1.l.google.com:19302',
  'stun:stun.cloudflare.com:3478',
];
async function diagnoseNat() {
  natBtn.disabled = true;
  addMessage('NAT 진단 시작 — STUN 3곳으로 후보 수집(최대 8초)…', 'sys');
  const pc = new RTCPeerConnection({ iceServers: NAT_STUN.map(u => ({ urls: u })) });
  pc.createDataChannel('nat');
  const srflx = []; // {addr, port, rport}
  pc.onicecandidate = (e) => {
    if (!e.candidate) return;
    const s = e.candidate.candidate; // "candidate:... udp <prio> <addr> <port> typ srflx raddr <ra> rport <rp>"
    const m = s.match(/ (\S+) (\d+) typ srflx(?:.* rport (\d+))?/);
    if (m) {
      const rec = { addr: m[1], port: +m[2], rport: m[3] ? +m[3] : null };
      srflx.push(rec);
      addMessage(`srflx: ${rec.addr}:${rec.port}${rec.rport ? ` (local rport=${rec.rport})` : ''}`, 'sys');
    }
  };
  try {
    await pc.setLocalDescription(await pc.createOffer());
  } catch (err) {
    addMessage(`NAT 진단 실패: ${err.message}`, 'sys');
    pc.close(); natBtn.disabled = false; return;
  }
  await new Promise((res) => {
    const done = () => res();
    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') done(); };
    setTimeout(done, 8000); // gathering 이 complete 안 떠도 강제 종료
  });
  pc.close();

  const ports = [...new Set(srflx.map(s => s.port))];
  const ips = [...new Set(srflx.map(s => s.addr))];
  if (srflx.length === 0) {
    addMessage('❌ srflx 후보 없음 — STUN 도달 실패(UDP 차단?). 판정 불가.', 'sys');
  } else if (ports.length === 1) {
    addMessage(`✅ 공인 포트 일정(${ports[0]}) → Cone NAT (endpoint-independent). STUN 만으로 P2P 가능성 높음.`, 'sys');
  } else {
    addMessage(`⚠️ 공인 포트가 여러 개 [${ports.join(', ')}] → ★ Symmetric NAT ★. STUN 무의미, TURN 필수.`, 'sys');
  }
  if (ips.length > 1) addMessage(`공인 IP 도 여러 개 [${ips.join(', ')}] — CGNAT 로드밸런싱 가능성.`, 'sys');
  natBtn.disabled = false;
}
natBtn.addEventListener('click', diagnoseNat);

roomForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  room = roomInput.value.trim();
  signalBase = signalInput.value.trim().replace(/\/+$/, '');
  if (!room || !signalBase) return;
  if (location.protocol === 'https:' && signalBase.startsWith('http:')) {
    setStatus('https 페이지에서는 http:// 시그널 서버를 사용할 수 없습니다 (mixed content 차단)');
    return;
  }
  // TURN 설정 조립 — 입력이 있으면 STUN 뒤에 붙인다
  const turnUrl = turnInput.value.trim();
  if (turnUrl) {
    iceServers = [...STUN, {
      urls: turnUrl.split(',').map(s => s.trim()).filter(Boolean),
      username: turnUser.value.trim(),
      credential: turnCred.value.trim(),
    }];
  } else {
    iceServers = STUN;
  }
  iceTransportPolicy = turnOnly.checked ? 'relay' : 'all';
  localStorage.setItem('signalBase', signalBase);
  localStorage.setItem('turnUrl', turnUrl);
  localStorage.setItem('turnUser', turnUser.value.trim());
  localStorage.setItem('turnCred', turnCred.value.trim());
  signalInput.disabled = true;
  roomInput.disabled = true;
  joinBtn.disabled = true;
  try {
    await joinRoom();
    pollLoop();
  } catch (err) {
    setStatus(`입장 실패: ${err.message}`);
    signalInput.disabled = false;
    roomInput.disabled = false;
    joinBtn.disabled = false;
  }
});

sendForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = msgInput.value.trim();
  if (!text) return;
  let sent = 0;
  for (const p of peers.values()) {
    if (p.dc && p.dc.readyState === 'open') { p.dc.send(text); sent++; }
  }
  if (sent > 0) { addMessage(text, 'sent'); msgInput.value = ''; }
});

window.addEventListener('pagehide', () => {
  polling = false;
  if (myId && token) {
    fetch(roomPath('leave'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ peer_id: myId, token }),
      keepalive: true,
    }).catch(() => {});
  }
});
</script>
</body>
</html>
